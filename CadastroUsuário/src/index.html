<body>
    <section>
        <form id="cadastrado.php" action="cadastrado.html" method="POST" class="validador">
            <div class="cad">
                <h3>CRIE SUA CONTA</h3>
            </div> <!-- cad -->

            <div class="cad">
                <p>Nome</p>
                <i class="fa fa-user fa-fw"></i>
                <input type="text" name="nome" placeholder="Seu nome" data-rules="nome" />
            </div> <!-- cad -->

            <div class="cad">
                <p>Email</p>
                <i class="fa fa-envelope fa-fw"></i>
                <input type="email" name="email" placeholder="Seu email" data-rules="email" />
            </div> <!-- cad -->

            <div class="cad">
                <p>Senha</p>
                <i class="fa fa-lock fa-fw"></i>
                <input type="password" name="senha" placeholder="Sua senha" data-rules="senha" />
            </div> <!-- cad -->

            <div class="cad">
                <input type="submit" value="Criar Conta" />
            </div> <!-- cad -->
        </form> <!-- validador -->
    </section>
